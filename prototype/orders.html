<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 我的订单</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="tabbar.css">
  <style>
    .orders-sticky { position:sticky; top:0; z-index:35; padding-bottom:10px; border-bottom:1px solid rgba(26,26,26,.045); background:rgba(248,246,241,.94); backdrop-filter:blur(18px); }
    .head { padding:24px 15px 8px; }
    .tabs { display:flex; gap:8px; padding:12px 14px 0; overflow:auto; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { min-height:32px; padding:0 13px; border-radius:16px; color:var(--mist); background:#fff; font-size:12px; white-space:nowrap; }
    .tab.active { color:#fff; background:var(--green); }
    .orders { display:grid; gap:11px; padding:14px; }
    .order-card { padding:14px; }
    .order-head { display:flex; justify-content:space-between; gap:10px; padding-bottom:11px; border-bottom:1px solid var(--line); }
    .order-type { font-size:14px; font-weight:750; }
    .order-no { margin-top:4px; color:var(--mist); font-size:11px; }
    .order-main { display:flex; gap:11px; padding:12px 0; }
    .summary { min-width:0; flex:1; }
    .summary h3 { font-size:14px; }
    .summary p { margin-top:6px; color:var(--mist); font-size:12px; line-height:1.5; }
    .order-info { display:flex; align-items:end; justify-content:space-between; gap:10px; }
    .order-time { color:var(--mist); font-size:11px; }
    .order-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
    .order-actions .button { min-height:35px; padding:0 12px; font-size:12px; }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <div class="orders-sticky">
        <header class="head"><h1 class="title">我的订单</h1><p class="subtitle">查看点餐与预约记录</p></header>
        <div class="tabs" id="tabs"></div>
      </div>
      <section class="orders" id="orders"></section>
    </div>
    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item" onclick="navigateTo('home')"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M6 10.5V21h12V10.5"/></svg><span>首页</span></button>
      <button class="nav-item" onclick="navigateTo('menu')"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span>点餐</span></button>
      <button class="nav-item" onclick="navigateTo('intro')"><svg viewBox="0 0 24 24"><path d="M4 19l5-7 4 3 3-5 4 9"/><path d="M4 21h16"/></svg><span>介绍</span></button>
      <button class="nav-item" onclick="navigateTo('booking')"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M6 19v-8h12v8"/><path d="M8 11V7h8v4"/></svg><span>预订</span></button>
      <button class="nav-item" onclick="navigateTo('profile')"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg><span>我的</span></button>
    </nav>
  </main>
  <script src="common.js"></script>
  <script>
    const data=[
      {type:"meal",label:"点餐订单",no:"TY20260601001",status:"制作中",tone:"green",title:"停云·林鸡野趣套餐等 3 件",desc:"桌号 A01 · 2 位用餐",time:"2026-06-01 12:18",price:234,img:"../部分图片/晚饭.jpg"},
      {type:"dining",label:"餐厅预订",no:"TY20260528008",status:"待店长确认",tone:"gold",title:"栖鹿 · 晚餐",desc:"2026-06-06 · 8 位 · 到店支付",time:"2026-05-28 16:40",price:0,img:"../部分图片/茶空间.jpg"},
      {type:"stay",label:"住宿预订",no:"TY20260518003",status:"已确认",tone:"green",title:"春悦 · 亲子房",desc:"2026-06-12 至 2026-06-13 · 1 晚",time:"2026-05-18 10:26",price:0,img:"../部分图片/禅修3.jpg"},
      {type:"meal",label:"点餐订单",no:"TY20260510021",status:"已完成",tone:"disabled",title:"下午茶套餐等 2 件",desc:"桌号 B03 · 3 位用餐",time:"2026-05-10 15:02",price:104,img:"../部分图片/茶.jpg"}
    ];
    let filter="all";
    const filters=[["all","全部"],["meal","点餐订单"],["booking","预约订单"],["pending","待处理"],["done","已完成"]];
    function list(){ return data.filter(o=>filter==="all"||(filter==="booking"&&(o.type==="dining"||o.type==="stay"))||(filter==="pending"&&o.status.includes("待"))||(filter==="done"&&o.status==="已完成")||o.type===filter); }
    function render(){
      document.getElementById("tabs").innerHTML=filters.map(f=>`<button class="tab ${filter===f[0]?"active":""}" onclick="filter='${f[0]}';render()">${f[1]}</button>`).join("");
      document.getElementById("orders").innerHTML=list().map(o=>`<article class="order-card card">
        <div class="order-head"><div><div class="order-type">${o.label}</div><div class="order-no">${o.no}</div></div><span class="tag ${o.tone}">${o.status}</span></div>
        <div class="order-main"><img class="product-thumb" src="${o.img}" alt="${o.title}"><div class="summary"><h3>${o.title}</h3><p>${o.desc}</p></div></div>
        <div class="order-info"><span class="order-time">${o.time}</span>${o.price?`<strong>${money(o.price)}</strong>`:"<span class='small muted'>到店支付</span>"}</div>
        <div class="order-actions"><button class="button secondary" onclick="showToast('客服联系方式将在正式上线前补充')">联系客服</button><button class="button" onclick="navigateTo('order-detail','?type=${o.type}&no=${o.no}')">查看详情</button></div>
      </article>`).join("") || "<div class='card' style='padding:24px;text-align:center;color:var(--mist);font-size:13px'>暂无对应订单</div>";
    }
    render();
  </script>
</body>
</html>
