<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 - 我的订单</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink-black': '#1a1a1a',
            'ink-gray': '#4a4a4a',
            'mountain-green': '#4F6F52',
            'mist-gray': '#7C8A8C',
            'paper-white': '#F8F6F1',
            'warm-beige': '#E8E4DC',
            'accent-gold': '#C9A962',
          },
          fontFamily: {
            'serif': ['Noto Serif SC', 'serif'],
          },
        }
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: #F8F6F1;
      color: #1a1a1a;
      overflow-x: hidden;
    }
    
    .landscape-bg {
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(79, 111, 82, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(124, 138, 140, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, #F8F6F1 0%, #F0EDE6 100%);
      min-height: 100vh;
    }
    
    .decorative-line {
      width: 40px;
      height: 2px;
      background: #C9A962;
    }
    
    /* 状态标签 */
    .status-tab {
      padding: 6px 16px;
      border-radius: 16px;
      font-size: 12px;
      transition: all 0.3s;
      cursor: pointer;
      white-space: nowrap;
    }
    
    .status-tab.active {
      background: #4F6F52;
      color: white;
    }
    
    .status-tab:not(.active) {
      background: white;
      color: #4a4a4a;
      border: 1px solid rgba(0,0,0,0.08);
    }
    
    /* 订单卡片 */
    .order-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
    }
    
    .status-badge.pending {
      background: #FFF8E7;
      color: #C9A962;
    }
    
    .status-badge.confirmed {
      background: #E8F5E9;
      color: #4F6F52;
    }
    
    .status-badge.completed {
      background: #F5F5F5;
      color: #7C8A8C;
    }
    
    .status-badge.cancelled {
      background: #FFEBEE;
      color: #C62828;
    }
    
    /* 按钮 */
    .btn-secondary {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      background: #F0EDE6;
      color: #4a4a4a;
      border: none;
      cursor: pointer;
    }
    
    .btn-primary {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      background: #4F6F52;
      color: white;
      border: none;
      cursor: pointer;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #E8E4DC 0%, #d4cfc4 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    
    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 8px 0 24px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 16px;
      color: #7C8A8C;
      transition: color 0.3s;
    }
    
    .nav-item.active {
      color: #4F6F52;
    }
    
    .nav-icon {
      width: 24px;
      height: 24px;
    }
    
    .scroll-container {
      height: calc(100vh - 76px);
      overflow-y: auto;
      padding-bottom: 100px;
    }
    
    .scroll-container::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div class="landscape-bg">
    <!-- 顶部问候语 -->
    <div class="bg-white px-4 py-3 sticky top-0 z-20">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs text-mist-gray tracking-wider" id="greeting">上午好</p>
          <h1 class="text-lg font-bold text-ink-black tracking-wider mt-0.5">山里人</h1>
        </div>
      </div>
    </div>
    
    <div class="scroll-container">
      <!-- 状态筛选 -->
      <div class="px-4 py-3">
        <div class="flex gap-2 overflow-x-auto pb-2" style="scrollbar-width: none;">
          <div class="status-tab active" data-status="all">全部</div>
          <div class="status-tab" data-status="pending">待确认</div>
          <div class="status-tab" data-status="confirmed">已确认</div>
          <div class="status-tab" data-status="completed">已完成</div>
        </div>
      </div>
      
      <!-- 订单列表 -->
      <div class="px-4 space-y-3" id="order-list">
        <!-- 订单1 - 待确认 -->
        <div class="order-card" data-status="pending">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-lg"><svg viewBox="0 0 24 24" fill="none" stroke="#4F6F52" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v4l3 6h8l2-6V3"/><path d="M6 13v3a2 2 0 002 2h8a2 2 0 002-2v-3"/><line x1="10" y1="3" x2="14" y2="3"/></svg></span>
              <span class="text-sm font-medium text-ink-black">用餐订单</span>
            </div>
            <span class="status-badge pending">
              <span class="w-1.5 h-1.5 bg-accent-gold rounded-full"></span>
              待确认
            </span>
          </div>
          
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-mist-gray">订单号</span>
              <span class="text-ink-gray">ORD20241215001</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐时间</span>
              <span class="text-ink-gray">12月15日 11:30</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐人数</span>
              <span class="text-ink-gray">4人</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">订单金额</span>
              <span class="text-mountain-green font-bold">¥160</span>
            </div>
          </div>
          
          <div class="flex gap-2 mt-4 pt-3 border-t border-gray-100">
            <button class="btn-secondary flex-1" onclick="contactService()">联系客服</button>
            <button class="btn-primary flex-1" onclick="viewDetail('ORD20241215001')">查看详情</button>
          </div>
        </div>
        
        <!-- 订单2 - 已确认 -->
        <div class="order-card" data-status="confirmed">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;color:#8B7355"><rect x="4" y="4" width="16" height="16" rx="3"/><line x1="4" y1="10" x2="20" y2="10"/></svg></span>
              <span class="text-sm font-medium text-ink-black">用餐订单</span>
            </div>
            <span class="status-badge confirmed">
              <span class="w-1.5 h-1.5 bg-mountain-green rounded-full"></span>
              已确认
            </span>
          </div>
          
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-mist-gray">订单号</span>
              <span class="text-ink-gray">ORD20241210002</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐时间</span>
              <span class="text-ink-gray">12月10日 17:30</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐人数</span>
              <span class="text-ink-gray">6人</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">订单金额</span>
              <span class="text-mountain-green font-bold">¥1,008</span>
            </div>
          </div>
          
          <div class="flex gap-2 mt-4 pt-3 border-t border-gray-100">
            <button class="btn-secondary flex-1" onclick="contactService()">联系客服</button>
            <button class="btn-primary flex-1" onclick="viewDetail('ORD20241210002')">查看详情</button>
          </div>
        </div>
        
        <!-- 订单3 - 已完成 -->
        <div class="order-card" data-status="completed">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-lg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;color:#4F6F52"><circle cx="12" cy="12" r="9"/><path d="M12 3v6l-4 3"/><path d="M12 3v6l4 3"/><path d="M8 14l4 3"/><path d="M16 14l-4 3"/></svg></span>
              <span class="text-sm font-medium text-ink-black">用餐订单</span>
            </div>
            <span class="status-badge completed">
              <span class="w-1.5 h-1.5 bg-mist-gray rounded-full"></span>
              已完成
            </span>
          </div>
          
          <div class="space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-mist-gray">订单号</span>
              <span class="text-ink-gray">ORD20241205003</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐时间</span>
              <span class="text-ink-gray">12月5日 12:00</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">用餐人数</span>
              <span class="text-ink-gray">2人</span>
            </div>
            <div class="flex justify-between">
              <span class="text-mist-gray">订单金额</span>
              <span class="text-mountain-green font-bold">¥116</span>
            </div>
          </div>
          
          <div class="flex gap-2 mt-4 pt-3 border-t border-gray-100">
            <button class="btn-secondary flex-1" onclick="contactService()">联系客服</button>
            <button class="btn-primary flex-1" onclick="viewDetail('ORD20241205003')">查看详情</button>
          </div>
        </div>
      </div>
      
      <!-- 空状态（默认隐藏） -->
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>
        <h3 class="text-base font-medium text-ink-black mb-2">暂无订单</h3>
        <p class="text-sm text-mist-gray">您还没有相关订单</p>
        <button class="mt-6 px-6 py-2 bg-mountain-green text-white rounded-full text-sm" onclick="navigateTo('menu')">去点餐</button>
      </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="navigateTo('home')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs tracking-wider">首页</span>
      </div>
      <div class="nav-item" onclick="navigateTo('menu')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-xs tracking-wider">点单</span>
      </div>
      <div class="nav-item active">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <span class="text-xs tracking-wider">订单</span>
      </div>
      <div class="nav-item" onclick="navigateTo('profile')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs tracking-wider">我的</span>
      </div>
    </div>
  </div>

  <script>
    // 设置问候语
    function setGreeting() {
      const hour = new Date().getHours();
      let greeting = '上午好';
      if (hour >= 12 && hour < 18) {
        greeting = '下午好';
      } else if (hour >= 18) {
        greeting = '晚上好';
      }
      document.getElementById('greeting').textContent = greeting;
    }
    setGreeting();
    
    // 状态筛选
    document.querySelectorAll('.status-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.status-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        
        const status = this.dataset.status;
        filterOrders(status);
      });
    });
    
    // 筛选订单
    function filterOrders(status) {
      const orders = document.querySelectorAll('.order-card');
      let visibleCount = 0;
      
      orders.forEach(order => {
        if (status === 'all' || order.dataset.status === status) {
          order.style.display = 'block';
          visibleCount++;
        } else {
          order.style.display = 'none';
        }
      });
      
      // 显示/隐藏空状态
      const emptyState = document.getElementById('empty-state');
      if (visibleCount === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
      }
    }
    
    // 取消订单
    function cancelOrder(orderId) {
      if (confirm('确定要取消该订单吗？')) {
        alert('订单已取消');
        // 实际项目中这里会调用API
      }
    }
    
    // 删除订单
    function deleteOrder(orderId) {
      if (confirm('确定要删除该订单吗？')) {
        alert('订单已删除');
        // 实际项目中这里会调用API
      }
    }
    
    // 查看详情
    function viewDetail(orderId) {
      alert('查看订单详情：' + orderId);
    }
    
    // 联系客服
    function contactService() {
      alert('客服电话：400-123-4567');
    }
    
    // 页面跳转
    function navigateTo(page) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'navigate',
          target: page,
          page: page + '.html'
        }, '*');
      }
    }
  </script>
</body>
</html>
