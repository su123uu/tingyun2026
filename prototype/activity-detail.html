<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 活动详情</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .scroll { padding-bottom:90px; }
    .cover { width:100%; height:222px; object-fit:cover; }
    .detail-title { padding:17px 14px 0; }
    .detail-title h1 { font-size:23px; }
    .detail-title p { margin-top:8px; color:var(--mist); font-size:13px; line-height:1.7; }
    .detail-card { padding:4px 14px; }
    .copy { padding:14px; color:var(--ink-soft); font-size:13px; line-height:1.9; }
    .copy p + p { margin-top:10px; }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <header class="topbar"><button class="back" onclick="goBack('activity')" aria-label="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 18l-6-6 6-6"/></svg></button><div><h1 class="title">活动详情</h1><p class="subtitle">停云会员专属活动</p></div></header>
      <img class="cover" src="../部分图片/茶活动正.jpg" alt="山间茶艺品鉴会">
      <section class="detail-title"><span class="tag green">可报名 · 剩余 4 席</span><h1>山间茶艺品鉴会</h1><p>循香识茶，也在一盏茶的时间里慢下来。</p></section>
      <section class="content">
        <section class="section"><div class="section-head"><h2 class="section-title">活动信息</h2></div><div class="card detail-card"><div class="info-line"><span class="info-label">活动时间</span><span>2026-06-20 16:00-18:00</span></div><div class="info-line"><span class="info-label">活动地点</span><span>停云山居 · 茶空间</span></div><div class="info-line"><span class="info-label">人数上限</span><span>12 人</span></div><div class="info-line"><span class="info-label">报名截止</span><span>2026-06-18 18:00</span></div></div></section>
        <section class="section"><div class="section-head"><h2 class="section-title">活动介绍</h2></div><div class="card copy"><p>本次茶席以崂山春茶为引，带领会员认识不同茶汤的香气、温度与回甘。</p><p>活动将保留自由交流时间，可携 1 位同行者参与。</p></div></section>
        <section class="section"><div class="section-head"><h2 class="section-title">活动须知</h2></div><div class="card copy"><p>仅权益有效期内会员可报名，每位会员默认最多报名 2 人。超过人数请联系客服沟通。</p></div></section>
      </section>
    </div>
    <footer class="fixed-action"><button class="button secondary" onclick="showToast('客服联系方式将在正式上线前补充')">联系客服</button><button class="button" onclick="navigateTo('activity-signup')">立即报名</button></footer>
  </main>
  <script src="common.js"></script>
</body>
</html>
