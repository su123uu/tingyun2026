<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 我的</title>
  <link rel="stylesheet" href="tabbar.css">
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #5f625e;
      --mist: #8a918b;
      --paper: #f7f5f0;
      --white: #ffffff;
      --green: #4f6f52;
      --green-deep: #38523c;
      --gold: #d4ae62;
      --gold-light: #f0d995;
      --line: rgba(26, 26, 26, 0.07);
      --shadow: 0 8px 22px rgba(31, 43, 32, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      color: inherit;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    .app {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #f8f7f3 0%, #f3f0ea 100%);
    }

    .scroll {
      height: 100%;
      overflow-y: auto;
      padding: 20px 14px 104px;
      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }

    .user-card {
      position: relative;
      overflow: hidden;
      padding: 20px 18px;
      border-radius: 14px;
      color: var(--white);
      background:
        radial-gradient(circle at 86% 10%, rgba(255, 255, 255, 0.16), transparent 32%),
        linear-gradient(135deg, #597a5c 0%, var(--green-deep) 100%);
      box-shadow: var(--shadow);
    }

    .user-main {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      display: grid;
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }

    .avatar svg {
      width: 28px;
      height: 28px;
    }

    .user-name {
      font-size: 18px;
      font-weight: 650;
    }

    .user-copy {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
    }

    .member-level {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      margin-top: 10px;
      padding: 0 9px;
      border: 1px solid rgba(240, 217, 149, 0.42);
      border-radius: 12px;
      color: var(--gold-light);
      background: rgba(26, 26, 26, 0.16);
      font-size: 11px;
      letter-spacing: 1px;
    }

    .member-entry {
      position: relative;
      display: flex;
      width: 100%;
      min-height: 82px;
      margin-top: 12px;
      overflow: hidden;
      align-items: center;
      justify-content: space-between;
      padding: 17px 18px;
      border: 1px solid rgba(212, 174, 98, 0.72);
      border-radius: 12px;
      color: var(--gold-light);
      text-align: left;
      background:
        radial-gradient(circle at 92% 18%, rgba(212, 174, 98, 0.17), transparent 30%),
        linear-gradient(135deg, #141414 0%, #24221e 100%);
      box-shadow: 0 10px 22px rgba(22, 22, 20, 0.15);
    }

    .member-entry::after {
      content: "";
      position: absolute;
      right: -24px;
      bottom: -44px;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(212, 174, 98, 0.20);
      border-radius: 50%;
    }

    .member-eyebrow {
      color: rgba(240, 217, 149, 0.74);
      font-size: 10px;
      letter-spacing: 2px;
    }

    .member-title {
      margin-top: 5px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 19px;
      font-weight: 700;
    }

    .member-arrow {
      position: relative;
      z-index: 1;
      display: grid;
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      place-items: center;
      border: 1px solid rgba(240, 217, 149, 0.52);
      border-radius: 50%;
    }

    .member-arrow svg {
      width: 17px;
      height: 17px;
    }

    .list {
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid rgba(26, 26, 26, 0.035);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .list-item {
      display: flex;
      width: 100%;
      min-height: 60px;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    .list-item:last-child {
      border-bottom: 0;
    }

    .list-main {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .list-icon {
      display: grid;
      width: 31px;
      height: 31px;
      place-items: center;
      border-radius: 9px;
      color: var(--green);
      background: #eff4ee;
    }

    .list-icon.gold {
      color: #9b793d;
      background: #faf4e7;
    }

    .list-icon.rose {
      color: #a06464;
      background: #faeeee;
    }

    .list-icon svg {
      width: 18px;
      height: 18px;
    }

    .list-label {
      font-size: 14px;
    }

    .chevron {
      width: 17px;
      height: 17px;
      color: #aeb4af;
    }

    .version {
      padding: 25px 0 0;
      color: var(--mist);
      font-size: 11px;
      text-align: center;
    }

    .bottom-nav {
      position: fixed;
      z-index: 10;
      right: 0;
      bottom: 0;
      left: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 8px 0 20px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
    }

    .nav-item {
      display: flex;
      align-items: center;
      flex-direction: column;
      gap: 4px;
      color: #969e98;
      font-size: 11px;
    }

    .nav-item.active {
      color: var(--green);
    }

    .nav-item svg {
      width: 21px;
      height: 21px;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <section class="user-card" aria-label="个人信息">
        <div class="user-main">
          <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"></circle>
              <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"></path>
            </svg>
          </div>
          <div>
            <h2 class="user-name" id="greeting">你好，山里人</h2>
            <p class="user-copy">欢迎回到停云山居</p>
            <span class="member-level">辰升会员</span>
          </div>
        </div>
      </section>

      <button class="member-entry" type="button" onclick="openMember()">
        <span>
          <span class="member-eyebrow">TINGYUN MEMBER · ACTIVE</span>
          <span class="member-title">会员中心</span>
        </span>
        <span class="member-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"></path>
          </svg>
        </span>
      </button>

      <section class="list" aria-label="个人服务">
        <button class="list-item" type="button" onclick="navigateTo('orders')">
          <span class="list-main">
            <span class="list-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 3h12v18H6z"></path>
                <path d="M9 8h6M9 12h6M9 16h4"></path>
              </svg>
            </span>
            <span class="list-label">点餐订单</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
        <button class="list-item" type="button" onclick="navigateTo('orders')">
          <span class="list-main">
            <span class="list-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"></path><path d="M6 19v-8h12v8"></path><path d="M8 11V7h8v4"></path></svg>
            </span>
            <span class="list-label">预约订单</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"></path></svg>
        </button>
        <button class="list-item" type="button" onclick="navigateTo('member-center')">
          <span class="list-main">
            <span class="list-icon gold">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-4 7-10V5l-7-3-7 3v6c0 6 7 10 7 10z"></path><path d="M9 12l2 2 4-4"></path></svg>
            </span>
            <span class="list-label">活动权益</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"></path></svg>
        </button>
        <button class="list-item" type="button" onclick="showPlaceholder('优惠券')">
          <span class="list-main">
            <span class="list-icon gold">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4z"></path>
                <path d="M8 9v.01M8 15v.01M12 12h5"></path>
              </svg>
            </span>
            <span class="list-label">优惠券</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
      </section>

      <section class="list" aria-label="联系与设置">
        <button class="list-item" type="button" onclick="contactService()">
          <span class="list-main">
            <span class="list-icon rose">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z"></path>
              </svg>
            </span>
            <span class="list-label">联系客服</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
        <button class="list-item" type="button" onclick="navigateTo('intro')">
          <span class="list-main">
            <span class="list-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18l5-6 4 3 3-4 4 7"></path><path d="M4 20h16"></path></svg>
            </span>
            <span class="list-label">关于停云</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5l7 7-7 7"></path></svg>
        </button>
        <button class="list-item" type="button" onclick="showPlaceholder('设置')">
          <span class="list-main">
            <span class="list-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.7 1.7 0 00.34 1.82l.05.06-2.83 2.83-.06-.06a1.7 1.7 0 00-1.82-.33 1.7 1.7 0 00-1 1.51V21h-4v-.09A1.7 1.7 0 009 19.4a1.7 1.7 0 00-1.82.33l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 004.68 15a1.7 1.7 0 00-1.51-1H3v-4h.09A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.33-1.82l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 009 4.68a1.7 1.7 0 001-1.51V3h4v.09a1.7 1.7 0 001 1.51 1.7 1.7 0 001.82-.33l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0019.4 9a1.7 1.7 0 001.51 1H21v4h-.09a1.7 1.7 0 00-1.51 1z"></path>
              </svg>
            </span>
            <span class="list-label">设置</span>
          </span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
      </section>

      <p class="version">停云山居 v1.0.0</p>
    </div>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item" type="button" onclick="navigateTo('home')">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M6 10.5V21h12V10.5"></path><path d="M10 21v-6h4v6"></path></svg>
        <span>首页</span>
      </button>
      <button class="nav-item" type="button" onclick="navigateTo('menu')">
        <svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"></rect><path d="M8 9h8M8 13h8M8 17h5"></path></svg>
        <span>点餐</span>
      </button>
      <button class="nav-item" type="button" onclick="navigateTo('intro')">
        <svg viewBox="0 0 24 24"><path d="M4 19l5-7 4 3 3-5 4 9"></path><path d="M4 21h16"></path><circle cx="16" cy="5" r="2"></circle></svg>
        <span>介绍</span>
      </button>
      <button class="nav-item" type="button" onclick="navigateTo('booking')">
        <svg viewBox="0 0 24 24"><path d="M4 19h16"></path><path d="M6 19v-8h12v8"></path><path d="M8 11V7h8v4"></path></svg>
        <span>预订</span>
      </button>
      <button class="nav-item active" type="button">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"></path></svg>
        <span>我的</span>
      </button>
    </nav>
  </main>

  <script>
    function updateGreeting() {
      const hour = new Date().getHours();
      const greeting = hour < 12 ? "早上好" : hour < 18 ? "下午好" : "晚上好";
      document.getElementById("greeting").textContent = greeting + "，山里人";
    }

    function openMember() {
      window.location.href = "member-center.html";
    }

    function contactService() {
      alert("客服联系方式将在正式上线前补充");
    }

    function showPlaceholder(name) {
      alert(name + "入口暂为视觉占位");
    }

    function navigateTo(page) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "navigate", target: page, page: page + ".html" }, "*");
      } else {
        window.location.href = page + ".html";
      }
    }

    updateGreeting();
  </script>
</body>
</html>
