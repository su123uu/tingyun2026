<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 - 个人中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink-black': '#1a1a1a',
            'ink-gray': '#4a4a4a',
            'mountain-green': '#4F6F52',
            'mist-gray': '#7C8A8C',
            'paper-white': '#F8F6F1',
            'warm-beige': '#E8E4DC',
            'accent-gold': '#C9A962',
          },
          fontFamily: {
            'serif': ['Noto Serif SC', 'serif'],
          },
        }
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Serif SC', serif;
      background: #F8F6F1;
      color: #1a1a1a;
      overflow-x: hidden;
    }
    
    .landscape-bg {
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(79, 111, 82, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 60%, rgba(124, 138, 140, 0.1) 0%, transparent 50%),
        linear-gradient(180deg, #F8F6F1 0%, #F0EDE6 100%);
      min-height: 100vh;
    }
    
    .decorative-line {
      width: 40px;
      height: 2px;
      background: #C9A962;
    }
    
    /* 用户信息卡片 */
    .user-card {
      background: linear-gradient(135deg, #4F6F52 0%, #3d5a40 100%);
      border-radius: 20px;
      padding: 24px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .user-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    .user-card::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    /* 头像 */
    .avatar {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 2px solid rgba(255,255,255,0.3);
    }
    
    /* 统计卡片 */
    .stats-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #4F6F52;
    }
    
    .stat-label {
      font-size: 11px;
      color: #7C8A8C;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    
    /* 菜单列表 */
    .menu-list {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .menu-item:last-child {
      border-bottom: none;
    }
    
    .menu-item:active {
      background: #F8F6F1;
    }
    
    .menu-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .menu-icon {
      width: 36px;
      height: 36px;
      background: #F0EDE6;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .menu-text {
      font-size: 14px;
      color: #1a1a1a;
      letter-spacing: 1px;
    }
    
    .menu-arrow {
      width: 20px;
      height: 20px;
      color: #7C8A8C;
    }
    
    /* 会员推广卡片 - 黑底黄字高级风格 */
    .promo-card {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      border-radius: 16px;
      padding: 20px;
      color: white;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(201, 169, 98, 0.3);
    }
    
    .promo-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(201, 169, 98, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    .promo-card::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(201, 169, 98, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 8px 0 24px;
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 16px;
      color: #7C8A8C;
      transition: color 0.3s;
    }
    
    .nav-item.active {
      color: #4F6F52;
    }
    
    .nav-icon {
      width: 24px;
      height: 24px;
    }
    
    .scroll-container {
      height: calc(100vh - 76px);
      overflow-y: auto;
      padding-bottom: 100px;
    }
    
    .scroll-container::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div class="landscape-bg">
    <div class="scroll-container">
      <!-- 用户信息 -->
      <div class="px-4 pt-4">
        <div class="user-card">
          <div class="flex items-center gap-4 relative z-10">
            <div class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>
            <div>
              <h2 class="text-lg font-bold tracking-wider">山里人</h2>
              <p class="text-white/70 text-sm mt-1 tracking-wider">欢迎体验停云山居</p>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 会员推广 -->
      <div class="px-4 mt-4">
        <div class="promo-card">
          <div class="flex items-center gap-3 relative z-10">
            <div class="w-12 h-12 bg-accent-gold/30 rounded-full flex items-center justify-center text-2xl">
              <svg viewBox="0 0 24 24" fill="none" stroke="#C9A962" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18l2-8 5 3 4-6 4 6 5-3 2 8H3z"/><circle cx="12" cy="8" r="1"/></svg>
            </div>
            <div>
              <h3 class="font-bold tracking-wider text-accent-gold">成为会员</h3>
              <p class="text-gray-400 text-xs mt-1 tracking-wider">享受专属优惠与特权</p>
            </div>
          </div>
          <button class="mt-4 w-full py-2.5 bg-accent-gold text-black rounded-lg text-sm font-medium tracking-wider" onclick="showLogin()">
            了解详情
          </button>
        </div>
      </div>
      
      <!-- 功能菜单 -->
      <div class="px-4 mt-4">
        <div class="menu-list">
          <div class="menu-item" onclick="navigateTo('orders')">
            <div class="menu-left">
              <div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg></div>
              <span class="menu-text">我的订单</span>
            </div>
            <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
          <div class="menu-item">
            <div class="menu-left">
              <div class="menu-icon" style="background: #FFF8E7;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M3 9V7a2 2 0 012-2h14a2 2 0 012 2v2"/><path d="M3 15v2a2 2 0 002 2h14a2 2 0 002-2v-2"/><line x1="9" y1="12" x2="9" y2="12.01"/><line x1="15" y1="12" x2="15" y2="12.01"/></svg></div>
              <span class="menu-text">优惠券</span>
            </div>
            <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
      </div>
      
      <!-- 联系与设置 -->
      <div class="px-4 mt-4">
        <div class="menu-list">
          <div class="menu-item" onclick="contactService()">
            <div class="menu-left">
              <div class="menu-icon" style="background: #FCE4EC;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
              <span class="menu-text">联系客服</span>
            </div>
            <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
          <div class="menu-item">
            <div class="menu-left">
              <div class="menu-icon" style="background: #F3E5F5;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
              <span class="menu-text">设置</span>
            </div>
            <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
        </div>
      </div>
      
      <!-- 版本信息 -->
      <div class="text-center py-8">
        <p class="text-xs text-mist-gray tracking-wider">停云山居 v1.0.0</p>
      </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="navigateTo('home')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs tracking-wider">首页</span>
      </div>
      <div class="nav-item" onclick="navigateTo('menu')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span class="text-xs tracking-wider">点单</span>
      </div>
      <div class="nav-item" onclick="navigateTo('orders')">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        <span class="text-xs tracking-wider">订单</span>
      </div>
      <div class="nav-item active">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-xs tracking-wider">我的</span>
      </div>
    </div>
  </div>

  <script>
    // 登录提示
    function showLogin() {
      alert('v2.0 版本将开放会员功能');
    }
    
    // 联系客服
    function contactService() {
      alert('客服电话：400-123-4567');
    }
    
    // 页面跳转
    function navigateTo(page) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'navigate',
          target: page,
          page: page + '.html'
        }, '*');
      }
    }
  </script>
</body>
</html>
