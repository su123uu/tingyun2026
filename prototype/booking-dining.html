<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 用餐预订</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{'ink':'#1A1A1A','ink-gray':'#4A4A4A','green':'#4F6F52','mist':'#7C8A8C','paper':'#F8F6F1','beige':'#E8E4DC','gold':'#C9A962','bronze':'#8B7355'},fontFamily:{'serif':['Noto Serif SC','serif']}}}}</script>
  <style>
    :root { color-scheme:light; --green:#4F6F52; --gold:#C9A962; --paper:#F8F6F1; --beige:#E8E4DC; --ink:#1A1A1A; --mist:#7C8A8C; --bronze:#8B7355; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Serif SC',serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; }
    .landscape-bg {
      background: radial-gradient(ellipse 120% 60% at 30% 0%, rgba(79,111,82,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse 100% 50% at 70% 70%, rgba(124,138,140,0.06) 0%, transparent 50%),
                  linear-gradient(180deg, #F8F6F1 0%, #F3F1EC 100%);
      min-height:100vh;
    }
    .scroll-container { height:100vh; overflow-y:auto; }
    .scroll-container::-webkit-scrollbar { display:none; }

    .hero {
      background:linear-gradient(150deg,#8B7355 0%,#6B5940 100%);
      padding:56px 24px 30px; color:#fff; border-radius:0 0 32px 32px;
      position:sticky; top:0; z-index:30; overflow:hidden;
    }
    .hero::after {
      content:''; position:absolute; top:-30%; right:-20%;
      width:250px; height:250px; border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%);
    }
    .hero .back {
      display:inline-flex; align-items:center; gap:4px;
      color:rgba(255,255,255,0.65); font-size:12px; letter-spacing:2px;
      cursor:pointer; margin-bottom:16px; position:relative; z-index:1;
      transition:color 0.2s;
    }
    .hero .back:hover { color:#fff; }
    .hero .back svg { width:14px; height:14px; }
    .hero h1 { font-size:22px; font-weight:500; letter-spacing:6px; position:relative; z-index:1; }
    .hero p { font-size:12px; color:rgba(255,255,255,0.55); letter-spacing:3px; margin-top:6px; position:relative; z-index:1; }
    .hero .line { width:32px; height:1px; background:var(--gold); margin-top:14px; position:relative; z-index:1; }

    .sect { padding:22px 16px 12px; }
    .sect-hd { display:flex; align-items:center; gap:10px; }
    .sect-hd .bar { width:2px; height:16px; background:var(--gold); border-radius:1px; flex-shrink:0; }
    .sect-hd h3 { font-size:14px; font-weight:600; letter-spacing:3px; }

    /* 日期时段 */
    .picker-row {
      margin:0 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px;
    }
    .picker-item {
      background:rgba(255,255,255,0.82); backdrop-filter:blur(12px);
      border-radius:14px; padding:14px; text-align:center;
      box-shadow:0 1px 12px rgba(0,0,0,0.025),0 0 0 1px rgba(0,0,0,0.03);
      cursor:pointer; transition:transform 0.15s;
    }
    .picker-item:active { transform:scale(0.98); }
    .picker-item .lbl { font-size:10px; color:var(--mist); letter-spacing:2px; display:block; margin-bottom:2px; }
    .picker-item .val { font-size:13px; letter-spacing:2px; }
    .picker-item .val.placeholder { color:#bbb; }

    /* 人数 */
    .people-row {
      margin:0 16px; background:rgba(255,255,255,0.82); backdrop-filter:blur(12px);
      border-radius:14px; padding:12px 18px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 1px 12px rgba(0,0,0,0.025),0 0 0 1px rgba(0,0,0,0.03);
    }
    .people-row .plbl { font-size:12px; letter-spacing:2px; }
    .people-ctl { display:flex; align-items:center; gap:14px; }
    .pbtn {
      width:30px; height:30px; border-radius:50%;
      border:1.5px solid var(--beige); display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:16px; color:var(--green); user-select:none;
      transition:all 0.15s;
    }
    .pbtn:active { background:rgba(79,111,82,0.08); }
    .pnum { font-size:16px; font-weight:500; min-width:20px; text-align:center; }

    /* 餐厅 */
    .rest-grid { padding:0 16px; display:flex; flex-direction:column; gap:10px; }
    .rest-card {
      background:rgba(255,255,255,0.82); backdrop-filter:blur(12px);
      border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:14px;
      box-shadow:0 1px 12px rgba(0,0,0,0.025),0 0 0 1px rgba(0,0,0,0.03);
      border:1.5px solid transparent; cursor:pointer;
      transition:all 0.25s;
    }
    .rest-card:active { transform:scale(0.98); }
    .rest-card.selected { border-color:var(--gold); background:rgba(201,169,98,0.04); }
    .rst-icon {
      width:48px; height:48px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(139,115,85,0.06);
    }
    .rst-icon svg { width:22px; height:22px; }
    .rst-info { flex:1; }
    .rst-info .rn { font-size:14px; font-weight:500; letter-spacing:3px; }
    .rst-info .rt { font-size:11px; color:var(--mist); letter-spacing:1px; margin-top:2px; }
    .rst-ck {
      width:20px; height:20px; border-radius:50%; flex-shrink:0;
      border:1.5px solid var(--beige); transition:all 0.25s;
      display:flex; align-items:center; justify-content:center;
    }
    .rest-card.selected .rst-ck { border-color:var(--gold); background:var(--gold); }
    .rst-ck svg { display:none; width:12px; height:12px; }
    .rest-card.selected .rst-ck svg { display:block; }

    .form-card { margin:0 16px; padding:14px; border-radius:14px; background:rgba(255,255,255,0.82); box-shadow:0 1px 12px rgba(0,0,0,0.025),0 0 0 1px rgba(0,0,0,0.03); }
    .form-card input,.form-card textarea { width:100%; padding:10px 0; border:0; border-bottom:1px solid rgba(26,26,26,.07); outline:0; color:var(--ink); background:transparent; font-family:inherit; font-size:12px; }
    .form-card textarea { min-height:68px; resize:none; }

    .submit-area { padding:20px 16px 36px; }
    .submit-btn {
      width:100%; padding:15px; border:none; border-radius:16px;
      background:linear-gradient(150deg,#8B7355 0%,#6B5940 100%);
      color:#fff; font-family:'Noto Serif SC',serif;
      font-size:15px; letter-spacing:6px; cursor:pointer;
      transition:opacity 0.2s,transform 0.2s;
    }
    .submit-btn:active { transform:scale(0.98); opacity:0.9; }
    .submit-btn:disabled { opacity:0.35; cursor:not-allowed; }
    .submit-btn .hint { display:block; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.55); margin-top:3px; }
  </style>
</head>
<body>
  <div class="landscape-bg">
    <div class="scroll-container">
      <div class="hero">
        <a class="back" onclick="history.back()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
          返回预订
        </a>
        <h1>用餐预订</h1>
        <p>择一雅间，品味山间至味</p>
        <div class="line"></div>
      </div>

      <!-- 日期时段 -->
      <div class="sect"><div class="sect-hd"><div class="bar"></div><h3>日期与时段</h3></div></div>
      <div class="picker-row">
        <div class="picker-item" onclick="toggleVal('dineDate','5月28日')">
          <span class="lbl">用餐日期</span>
          <span class="val placeholder" id="dineDate">请选择</span>
        </div>
        <div class="picker-item" onclick="toggleVal('dineTime','午餐 11:30')">
          <span class="lbl">用餐时段</span>
          <span class="val placeholder" id="dineTime">请选择</span>
        </div>
      </div>

      <!-- 人数 -->
      <div class="sect"><div class="sect-hd"><div class="bar"></div><h3>用餐人数</h3></div></div>
      <div class="people-row">
        <span class="plbl">人数</span>
        <div class="people-ctl">
          <div class="pbtn" onclick="changePpl(-1)">−</div>
          <span class="pnum" id="ppl">6</span>
          <div class="pbtn" onclick="changePpl(1)">+</div>
        </div>
      </div>

      <!-- 餐厅 -->
      <div class="sect"><div class="sect-hd"><div class="bar"></div><h3>选择餐厅</h3></div></div>
      <div class="rest-grid" id="restContainer"></div>

      <div class="sect"><div class="sect-hd"><div class="bar"></div><h3>联系信息</h3></div></div>
      <div class="form-card">
        <input value="山里人" aria-label="联系人" placeholder="联系人">
        <input value="13866886688" aria-label="手机号" placeholder="手机号">
        <textarea aria-label="备注" placeholder="备注：填写用餐需求或其他说明"></textarea>
      </div>

      <!-- 提交 -->
      <div class="submit-area">
        <button class="submit-btn" id="submitBtn" disabled onclick="doSubmit()">
          提交预订
          <span class="hint" id="submitHint">请完善预订信息</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const restaurants = [
      { id:'xigu', name:'兮古', capacity:'6-10人',
        icon:'<rect x="4" y="6" width="16" height="14" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><rect x="7" y="10" width="4" height="10"/><rect x="13" y="10" width="4" height="10"/>' },
      { id:'qilu', name:'栖鹿', capacity:'8-12人',
        icon:'<path d="M5 20V12L12 6l7 6v8"/><path d="M8 20v-6h8v6"/><circle cx="12" cy="14" r="1.5"/><rect x="5" y="4" width="14" height="5" rx="1"/>' },
      { id:'mengtang', name:'梦堂', capacity:'8-12人',
        icon:'<path d="M5 20V8l7-5 7 5v12"/><rect x="8" y="11" width="8" height="9"/><circle cx="12" cy="11" r="2"/>' },
      { id:'xinyu', name:'心语', capacity:'8-12人',
        icon:'<circle cx="12" cy="10" r="7"/><path d="M8 14c.83 0 1.5.67 1.5 1.5v2.5h5v-2.5c0-.83.67-1.5 1.5-1.5"/><circle cx="10" cy="9" r="0.8"/><circle cx="14" cy="9" r="0.8"/>' }
    ];

    let selRest = [], ppl = 6;
    let dateOk = false, timeOk = false;

    function render() {
      document.getElementById('restContainer').innerHTML = restaurants.map(r => `
        <div class="rest-card" onclick="selectRest('${r.id}')" data-id="${r.id}">
          <div class="rst-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${r.icon}</svg>
          </div>
          <div class="rst-info"><div class="rn">${r.name}</div><div class="rt">容纳 ${r.capacity}</div></div>
          <div class="rst-ck">
            <svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="3,8 7,12 13,4"/></svg>
          </div>
        </div>
      `).join('');

    }

    function selectRest(id) { selRest=selRest.includes(id)?selRest.filter(x=>x!==id):[...selRest,id]; document.querySelectorAll('.rest-card').forEach(el=>el.classList.toggle('selected', selRest.includes(el.dataset.id))); check(); }

    function toggleVal(id, val) {
      const el = document.getElementById(id);
      if (el.classList.contains('placeholder')) { el.textContent = val; el.classList.remove('placeholder'); }
      else { el.textContent = '请选择'; el.classList.add('placeholder'); }
      dateOk = !document.getElementById('dineDate').classList.contains('placeholder');
      timeOk = !document.getElementById('dineTime').classList.contains('placeholder');
      check();
    }

    function changePpl(d) { ppl = Math.max(1, Math.min(100, ppl+d)); document.getElementById('ppl').textContent = ppl; check(); }

    function check() {
      const btn = document.getElementById('submitBtn'), hint = document.getElementById('submitHint');
      const ok = dateOk && timeOk && selRest.length;
      if (ok) {
        btn.disabled = false;
        hint.textContent = `已选 ${selRest.length} 个包间 · 到店支付`;
      } else {
        btn.disabled = true;
        const m = [];
        if (!dateOk) m.push('日期');
        if (!timeOk) m.push('时段');
        if (!selRest.length) m.push('餐厅');
        hint.textContent = `请选择${m.join('、')}`;
      }
    }

    function doSubmit() {
      if (!selRest.length) return;
      const names = restaurants.filter(x=>selRest.includes(x.id)).map(x=>x.name).join('、');
      alert(`需求已提交，当前状态为待店长确认。\n餐厅：${names}\n日期：${document.getElementById('dineDate').textContent} ${document.getElementById('dineTime').textContent}\n人数：${ppl}位\n\n到店支付，客服将电话联系您确认信息。`);
      window.location.href = 'order-detail.html?type=dining&no=TY20260601011';
    }

    render();
  </script>
</body>
</html>
