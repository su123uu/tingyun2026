<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 扫码点餐</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="tabbar.css">
  <style>
    .app { height:100vh; overflow:hidden; }
    .scroll { display:flex; height:calc(100vh - 76px); flex-direction:column; overflow:hidden; }
    .menu-head { flex:0 0 auto; padding: 22px 15px 12px; border-bottom:1px solid rgba(26,26,26,.045); background:rgba(248,246,241,.94); backdrop-filter:blur(18px); }
    .menu-head .title { font-size: 24px; }
    .table-card { display:flex; flex:0 0 auto; align-items:center; justify-content:space-between; gap:10px; margin: 10px 14px 12px; padding: 13px 14px; border-radius: 12px; color: var(--ink-soft); background:#fff; box-shadow:var(--shadow); }
    .table-card strong { display:block; color:var(--ink); font-size:14px; }
    .table-card span { display:block; margin-top:4px; color:var(--mist); font-size:11px; }
    .menu-layout { display:grid; min-height:0; flex:1; grid-template-columns:78px minmax(0,1fr); overflow:hidden; border-top:1px solid var(--line); background:rgba(255,255,255,.40); }
    .categories { align-self:stretch; padding:8px 0; overflow:hidden; background:rgba(232,228,220,.55); }
    .category { width:100%; min-height:54px; padding:0 7px; border-left:3px solid transparent; color:var(--mist); font-size:13px; }
    .category.active { border-left-color:var(--green); color:var(--green); background:rgba(255,255,255,.86); font-weight:700; }
    .goods { padding: 12px 11px 104px; overflow-y:auto; scrollbar-width:none; }
    .goods::-webkit-scrollbar { display:none; }
    .goods-group { scroll-margin-top: 12px; }
    .goods-group + .goods-group { margin-top: 18px; padding-top: 2px; }
    .goods-title { margin: 1px 0 10px; font-size:15px; font-weight:750; }
    .product { display:flex; gap:10px; padding:11px; border-radius:13px; background:#fff; box-shadow:var(--shadow); }
    .product + .product { margin-top:10px; }
    .product-main { min-width:0; flex:1; }
    .product-name { font-size:14px; font-weight:750; }
    .product-desc { margin-top:5px; color:var(--mist); font-size:11px; line-height:1.45; }
    .product-foot { display:flex; align-items:end; justify-content:space-between; gap:5px; margin-top:9px; }
    .product-price { color:var(--bronze); font-size:17px; font-weight:750; }
    .counter { display:flex; align-items:center; gap:8px; }
    .count-btn { display:grid; width:25px; height:25px; place-items:center; border:1px solid rgba(79,111,82,.22); border-radius:50%; color:var(--green); font-size:17px; line-height:1; }
    .count-btn.plus { color:#fff; background:var(--green); }
    .count { min-width:12px; font-size:13px; text-align:center; }
    .cart { position:fixed; z-index:24; right:12px; bottom:79px; left:12px; display:flex; min-height:62px; align-items:center; gap:11px; padding:10px 11px; border-radius:15px; color:#fff; background:#22251F; box-shadow:0 12px 26px rgba(26,26,26,.18); }
    .bag { position:relative; display:grid; width:40px; height:40px; flex:0 0 40px; place-items:center; border-radius:50%; color:#fff; background:var(--green); }
    .bag svg { width:21px; height:21px; fill:none; stroke:currentColor; stroke-width:1.6; }
    .badge { position:absolute; top:-5px; right:-4px; display:grid; min-width:17px; height:17px; place-items:center; padding:0 4px; border-radius:9px; color:#fff; background:var(--gold); font-size:10px; }
    .cart-copy { min-width:0; flex:1; }
    .cart-copy strong { display:block; font-size:16px; }
    .cart-copy span { display:block; margin-top:3px; color:rgba(255,255,255,.58); font-size:11px; }
    .checkout { min-width:86px; min-height:42px; border-radius:10px; color:#fff; background:var(--green); font-size:13px; font-weight:700; }
    .checkout:disabled { background:#777A74; }
    #cartLines { max-height: 360px; overflow-y: auto; }
    .sheet-row { display:flex; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); font-size:13px; }
    .cart-line { align-items:center; }
    .cart-line img { width:48px; height:48px; flex:0 0 48px; border-radius:9px; object-fit:cover; background:var(--beige); }
    .cart-line-main { min-width:0; flex:1; }
    .cart-line-main strong { display:block; overflow:hidden; font-size:13px; text-overflow:ellipsis; white-space:nowrap; }
    .cart-line-main span { display:block; margin-top:5px; color:var(--mist); font-size:11px; }
    .cart-line-total { flex:0 0 auto; color:var(--ink); font-size:13px; }
    .sheet-actions { display:flex; gap:10px; margin-top:15px; }
    .sheet-actions .button { flex:1; }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <header class="menu-head">
        <h1 class="title">山居点餐</h1>
        <p class="subtitle">时令入味，慢享山中一席</p>
      </header>
      <section class="table-card">
        <div>
          <strong id="tableTitle">浏览菜单</strong>
          <span id="tableDesc">桌上扫码后可填写人数并结算</span>
        </div>
      </section>
      <div class="menu-layout">
        <aside class="categories" id="categories"></aside>
        <section class="goods">
          <div id="goods"></div>
        </section>
      </div>
    </div>

    <section class="cart" onclick="openCart()">
      <div class="bag">
        <svg viewBox="0 0 24 24"><path d="M5 8h14l-1 12H6L5 8Z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg>
        <span class="badge" id="cartCount">0</span>
      </div>
      <div class="cart-copy"><strong id="cartTotal">¥0.00</strong><span id="cartHint">还未选择菜品</span></div>
      <button class="checkout" id="checkout" type="button" disabled onclick="event.stopPropagation(); checkout()">去结算</button>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item" type="button" onclick="navigateTo('home')"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M6 10.5V21h12V10.5"/><path d="M10 21v-6h4v6"/></svg><span>首页</span></button>
      <button class="nav-item active" type="button"><svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span>点餐</span></button>
      <button class="nav-item" type="button" onclick="navigateTo('intro')"><svg viewBox="0 0 24 24"><path d="M4 19l5-7 4 3 3-5 4 9"/><path d="M4 21h16"/><circle cx="16" cy="5" r="2"/></svg><span>介绍</span></button>
      <button class="nav-item" type="button" onclick="navigateTo('booking')"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M6 19v-8h12v8"/><path d="M8 11V7h8v4"/></svg><span>预订</span></button>
      <button class="nav-item" type="button" onclick="navigateTo('profile')"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg><span>我的</span></button>
    </nav>
  </main>

  <div class="modal" id="cartModal" onclick="closeCart(event)">
    <div class="sheet">
      <h2 class="sheet-title">已选菜品</h2>
      <div id="cartLines"></div>
      <div class="sheet-actions"><button class="button secondary" type="button" onclick="document.getElementById('cartModal').classList.remove('open')">继续点餐</button><button class="button" type="button" onclick="checkout()">去结算</button></div>
    </div>
  </div>
  <script src="common.js"></script>
  <script>
    const products = [
      {id:"tea", cat:"套餐", name:"下午茶套餐", desc:"山间茶席与时令茶点", price:38, img:"../部分图片/茶.jpg"},
      {id:"chicken", cat:"套餐", name:"停云·林鸡野趣套餐", desc:"崂山散养鸡，山野本味", price:168, img:"../部分图片/晚饭.jpg"},
      {id:"fish", cat:"套餐", name:"停云·泉鱼隐逸套餐", desc:"清泉鱼鲜，淡雅入味", price:198, img:"../部分图片/晚饭.jpg"},
      {id:"double", cat:"套餐", name:"停云双鲜·鱼跃鸡鸣", desc:"鱼鲜与林鸡的山居合席", price:318, img:"../部分图片/晚饭.jpg"},
      {id:"cucumber", cat:"凉菜", name:"黄瓜拌", desc:"清脆爽口，佐餐开胃", price:18, img:"../部分图片/茶2.jpg"},
      {id:"ginseng", cat:"热菜", name:"干煸崂山参", desc:"崂山风味，咸香下饭", price:48, img:"../部分图片/晚饭.jpg"},
      {id:"dumpling", cat:"主食", name:"海鲜水饺", desc:"手工现包，海味鲜香", price:38, img:"../部分图片/晚饭.jpg"},
      {id:"wine", cat:"饮品", name:"桂花酒", desc:"桂香清甜，低度微醺", price:28, img:"../部分图片/茶2.jpg"}
    ];
    const categories = ["套餐","凉菜","热菜","主食","饮品"];
    let active = "套餐";
    let cart = JSON.parse(localStorage.getItem("tingyunCart") || "{}");
    let table = localStorage.getItem("tingyunTable") || "";
    let people = localStorage.getItem("tingyunPeople") || "";
    const params = new URLSearchParams(location.search);
    if (params.get("table")) { table = params.get("table"); people = params.get("people") || "2"; persist(); }
    function persist(){ localStorage.setItem("tingyunCart", JSON.stringify(cart)); if(table) localStorage.setItem("tingyunTable",table); if(people) localStorage.setItem("tingyunPeople",people); }
    function qty(id){ return cart[id] || 0; }
    function categoryId(cat){ return "category-" + categories.indexOf(cat); }
    function renderCategories(){
      document.getElementById("categories").innerHTML = categories.map(c=>`<button class="category ${c===active?"active":""}" onclick="goCategory('${c}')">${c}</button>`).join("");
    }
    function productCard(p){
      return `<article class="product">
        <img class="product-thumb" src="${p.img}" alt="${p.name}">
        <div class="product-main"><h3 class="product-name">${p.name}</h3><p class="product-desc">${p.desc}</p>
        <div class="product-foot"><span class="product-price">¥${p.price}</span><span class="counter"><button class="count-btn" onclick="change('${p.id}',-1)">−</button><span class="count">${qty(p.id)}</span><button class="count-btn plus" onclick="change('${p.id}',1)">+</button></span></div></div>
      </article>`;
    }
    function render(){
      renderCategories();
      document.getElementById("goods").innerHTML = categories.map(cat=>`<section class="goods-group" id="${categoryId(cat)}"><h2 class="goods-title">${cat}</h2>${products.filter(p=>p.cat===cat).map(productCard).join("")}</section>`).join("");
      const count = Object.values(cart).reduce((a,b)=>a+b,0);
      const total = products.reduce((sum,p)=>sum+qty(p.id)*p.price,0);
      document.getElementById("cartCount").textContent=count;
      document.getElementById("cartTotal").textContent=money(total);
      document.getElementById("cartHint").textContent = table ? `桌号 ${table} · ${people} 位用餐` : "扫码后才能提交订单";
      document.getElementById("checkout").disabled = !table || !count;
      document.getElementById("tableTitle").textContent = table ? `桌号 ${table}` : "浏览菜单";
      document.getElementById("tableDesc").textContent = table ? `${people} 位用餐 · 可继续加购并结算` : "桌上扫码后可填写人数并结算";
    }
    function goCategory(cat){ active=cat; renderCategories(); const target=document.getElementById(categoryId(cat)); document.querySelector(".goods").scrollTo({top:target.offsetTop-12,behavior:"smooth"}); }
    function change(id, delta){ cart[id]=Math.max(0,qty(id)+delta); if(!cart[id]) delete cart[id]; persist(); render(); }
    function openCart(){ const selected=products.filter(p=>qty(p.id)); document.getElementById("cartLines").innerHTML=selected.length?selected.map(p=>`<div class="sheet-row cart-line"><img src="${p.img}" alt="${p.name}"><div class="cart-line-main"><strong>${p.name}</strong><span>${money(p.price)} × ${qty(p.id)}</span></div><strong class="cart-line-total">${money(p.price*qty(p.id))}</strong></div>`).join(""):"<p class='sheet-copy'>还未选择菜品。</p>"; document.getElementById("cartModal").classList.add("open"); }
    function closeCart(e){ if(e.target.id==="cartModal") e.currentTarget.classList.remove("open"); }
    function checkout(){ const count=Object.values(cart).reduce((a,b)=>a+b,0); if(!table){showToast("请先扫描桌上二维码");return;} if(!count){showToast("请先选择菜品");return;} navigateTo("order-confirm"); }
    render();
  </script>
</body>
</html>
