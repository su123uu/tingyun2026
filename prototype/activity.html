<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 会员活动</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .hero { position:sticky; top:0; z-index:35; height:230px; overflow:hidden; color:#fff; }
    .hero img { width:100%; height:100%; object-fit:cover; }
    .hero::after { position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.58)); content:""; }
    .hero .back { position:absolute; z-index:2; top:20px; left:13px; color:#fff; background:rgba(26,26,26,.20); border-radius:50%; }
    .hero-copy { position:absolute; z-index:2; right:20px; bottom:22px; left:20px; }
    .hero-copy span { color:rgba(255,255,255,.70); font-size:11px; letter-spacing:4px; }
    .hero-copy h1 { margin-top:7px; font-family:"Noto Serif SC","Songti SC",serif; font-size:25px; letter-spacing:3px; }
    .activity { overflow:hidden; }
    .activity img { width:100%; height:148px; object-fit:cover; display:block; }
    .activity-body { padding:14px; }
    .date { color:var(--bronze); font-size:11px; }
    .activity h3 { margin-top:6px; font-size:16px; }
    .activity p { margin-top:6px; color:var(--mist); font-size:12px; line-height:1.55; }
    .activity-foot { display:flex; align-items:center; justify-content:space-between; margin-top:11px; }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <header class="hero"><img src="../部分图片/会员活动.png" alt="会员活动"><button class="back" onclick="navigateTo('home')" aria-label="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 18l-6-6 6-6"/></svg></button><div class="hero-copy"><span>TINGYUN ACTIVITIES</span><h1>山中有会，茶席相逢</h1></div></header>
      <section class="content">
        <section class="section"><div class="section-head"><h2 class="section-title">近期活动</h2><span class="section-note">会员权益有效期内可报名</span></div><div class="stack">
          <article class="activity card"><img src="../部分图片/禅修活动正1.jpg" alt="禅修冥想体验课"><div class="activity-body"><div class="date">2026-06-15 14:00-17:00</div><h3>禅修冥想体验课</h3><p>专业导师带领，在山间安静半日。适合首次体验禅修的会员。</p><div class="activity-foot"><span class="tag green">剩余 6 席</span><button class="button" onclick="navigateTo('activity-detail','?id=meditation')">查看详情</button></div></div></article>
          <article class="activity card"><img src="../部分图片/茶活动正.jpg" alt="山间茶艺品鉴会"><div class="activity-body"><div class="date">2026-06-20 16:00-18:00</div><h3>山间茶艺品鉴会</h3><p>品茶、听山、会友。循茶香辨风味，也在席间认识同好。</p><div class="activity-foot"><span class="tag gold">剩余 4 席</span><button class="button" onclick="navigateTo('activity-detail','?id=tea')">查看详情</button></div></div></article>
          <article class="activity card"><img src="../部分图片/音乐活动正.jpg" alt="夏至山居音乐会"><div class="activity-body"><div class="date">2026-06-28 19:00-21:00</div><h3>夏至山居音乐会</h3><p>夜色与虫鸣之间，听一场山居限定的专题音乐会。</p><div class="activity-foot"><span class="tag disabled">已满员</span><button class="button secondary" onclick="navigateTo('activity-detail','?id=music')">查看详情</button></div></div></article>
        </div></section>
      </section>
    </div>
  </main>
  <script src="common.js"></script>
</body>
</html>
