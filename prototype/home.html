<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 首页</title>
  <link rel="stylesheet" href="tabbar.css">
  <style>
    :root {
      --ink: #1A1A1A;
      --ink-soft: #4A4A4A;
      --mist: #7C8A8C;
      --paper: #F8F6F1;
      --paper-deep: #F1EDE5;
      --beige: #E8E4DC;
      --green: #4F6F52;
      --bronze: #8B7355;
      --gold: #C9A962;
      --white: #FFFFFF;
      --line: rgba(26, 26, 26, 0.07);
      --shadow: 0 8px 24px rgba(26, 26, 26, 0.045);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 4%, rgba(79, 111, 82, 0.10), transparent 34%),
        linear-gradient(180deg, #F8F6F1 0%, #F3F0E9 100%);
    }

    .scroll {
      height: 100%;
      overflow-y: auto;
      padding-bottom: 104px;
      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }

    .hero {
      position: relative;
      aspect-ratio: 3 / 4;
      height: auto;
      overflow: hidden;
      background: #24331F;
    }

    .home-titlebar {
      position: sticky;
      top: 0;
      z-index: 32;
      display: flex;
      height: 58px;
      align-items: center;
      margin-bottom: -58px;
      padding: 18px 16px 10px;
      color: #fff;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 1px 8px rgba(0,0,0,.24);
      transition: .25s;
    }

    .home-titlebar.scrolled {
      color: var(--ink);
      border-bottom: 1px solid rgba(26,26,26,.045);
      background: rgba(248,246,241,.92);
      text-shadow: none;
      backdrop-filter: blur(18px);
    }

    .hero-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 720ms ease;
      background-size: cover;
      background-position: center;
    }

    .hero-slide.active {
      opacity: 1;
    }

    .hero-slide.one { background-image: url("../部分图片/茶空间.jpg"); }
    .hero-slide.two { background-image: url("../部分图片/茶活动正.jpg"); }
    .hero-slide.three { background-image: url("../部分图片/晚饭.jpg"); }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.10) 0%, rgba(0, 0, 0, 0.02) 34%, rgba(0, 0, 0, 0.44) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.30), transparent 62%);
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 42px 24px 74px;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    }

    .hero-kicker {
      width: fit-content;
      padding: 4px 9px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 11px;
      letter-spacing: 2px;
      backdrop-filter: blur(10px);
    }

    .hero-title {
      margin-top: 12px;
      font-size: 30px;
      font-weight: 650;
      letter-spacing: 5px;
      line-height: 1.25;
    }

    .hero-text {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 1.55;
    }

    .hero-dots {
      position: absolute;
      z-index: 2;
      right: 22px;
      bottom: 58px;
      display: flex;
      gap: 5px;
    }

    .hero-dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
      transition: width 240ms ease, background 240ms ease;
    }

    .hero-dot.active {
      width: 17px;
      background: #fff;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      margin: -50px 14px 0;
      border-radius: 18px;
      overflow: hidden;
      background: var(--white);
      box-shadow: 0 14px 34px rgba(26, 26, 26, 0.08);
      position: relative;
      z-index: 3;
    }

    .action-card {
      width: 100%;
      min-height: 158px;
      padding: 22px 12px 20px;
      color: var(--ink);
      overflow: hidden;
      position: relative;
      text-align: center;
      background: var(--white);
    }

    .action-card + .action-card {
      border-left: 1px solid var(--line);
    }

    .action-card.order {
      color: var(--green);
    }

    .action-card.booking {
      color: var(--bronze);
    }

    .action-card::after {
      display: none;
    }

    .action-icon {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      color: currentColor;
    }

    .action-title {
      display: block;
      margin-top: 13px;
      color: var(--ink);
      font-size: 19px;
      font-weight: 650;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .action-desc {
      display: block;
      margin-top: 7px;
      color: var(--mist);
      font-size: 12px;
      line-height: 1.45;
      letter-spacing: 0.5px;
    }

    .section {
      margin: 20px 14px 0;
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 2px;
    }

    .section-more {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--mist);
      font-size: 12px;
    }

    .section-more::after {
      content: "";
      width: 7px;
      height: 7px;
      border-top: 1.5px solid currentColor;
      border-right: 1.5px solid currentColor;
      transform: rotate(45deg);
    }

    .intro-card {
      display: block;
      width: 100%;
      min-height: 0;
      padding: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.80);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .intro-img {
      display: block;
      height: 154px;
      overflow: hidden;
      background: var(--beige);
    }

    .intro-img img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .intro-body {
      display: block;
      min-width: 0;
      padding: 15px 17px 16px;
    }

    .intro-title {
      display: block;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 1px;
    }

    .activity-card {
      display: block;
      width: 100%;
      padding: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .activity-img {
      display: block;
      width: 100%;
      height: 154px;
      overflow: hidden;
      background: var(--beige);
    }

    .activity-img img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .activity-body {
      display: block;
      padding: 15px 17px 16px;
    }

    .activity-name {
      display: block;
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0.5px;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 9px 8px calc(14px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.94);
      border-top: 1px solid rgba(0, 0, 0, 0.055);
      box-shadow: 0 -6px 22px rgba(0, 0, 0, 0.035);
      backdrop-filter: blur(16px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: #9B9B9B;
      font-size: 12px;
    }

    .nav-item.active {
      color: var(--green);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.65;
    }

    .nav-item.center svg {
      width: 32px;
      height: 18px;
      margin: 3px 0 3px;
    }

    @media (max-width: 360px) {
      .hero {
        aspect-ratio: 3 / 4;
        height: auto;
      }

      .action-card {
        min-height: 126px;
        padding-left: 10px;
        padding-right: 10px;
      }

      .action-title {
        font-size: 17px;
      }

      .hero-title {
        font-size: 27px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="scroll" aria-label="首页内容">
      <header class="home-titlebar" id="homeTitlebar">停云山居</header>
      <section class="hero" aria-label="山居轮播">
        <div class="hero-slide one active"></div>
        <div class="hero-slide two"></div>
        <div class="hero-slide three"></div>
        <div class="hero-copy">
          <span class="hero-kicker">今日山居</span>
          <h1 class="hero-title">停云待客<br>茶饭皆有时</h1>
          <p class="hero-text">青岛崂山 · 禅修、茶艺、美食与山居夜宿。</p>
        </div>
        <div class="hero-dots" aria-hidden="true">
          <span class="hero-dot active"></span>
          <span class="hero-dot"></span>
          <span class="hero-dot"></span>
        </div>
      </section>

      <section class="quick-actions" aria-label="快捷入口">
        <button class="action-card order" type="button" onclick="goTo('menu')">
          <svg class="action-icon" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 8h20v20H8z"/><path d="M13 13h5"/><path d="M13 18h10"/><path d="M13 23h7"/><path d="M25 24l4 4"/><path d="M29 24l-4 4"/>
          </svg>
          <span class="action-title">扫码点餐</span>
          <span class="action-desc">堂食下单 · 在线支付</span>
        </button>
        <button class="action-card booking" type="button" onclick="goTo('booking')">
          <svg class="action-icon" viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="7" y="9" width="22" height="20" rx="4"/><path d="M12 7v5"/><path d="M24 7v5"/><path d="M7 15h22"/><path d="M13 21h4"/><path d="M21 21h2"/>
          </svg>
          <span class="action-title">预约预订</span>
          <span class="action-desc">住宿用餐 · 到店支付</span>
        </button>
      </section>

      <section class="section" aria-label="山居介绍">
        <div class="section-head">
          <h2 class="section-title">山居一隅</h2>
          <button class="section-more" type="button" onclick="goToIntro()">了解更多</button>
        </div>
        <button class="intro-card" type="button" onclick="goToIntro()">
          <span class="intro-img"><img src="../部分图片/茶空间.jpg" alt="山居茶空间"></span>
          <span class="intro-body">
            <span class="intro-title">隐于崂山，归于自然</span>
          </span>
        </button>
      </section>

      <section class="section" aria-label="近期活动">
        <div class="section-head">
          <h2 class="section-title">会员活动</h2>
          <button class="section-more" type="button" onclick="openActivity()">进入活动页</button>
        </div>
        <button class="activity-card" type="button" onclick="openActivity()">
          <span class="activity-img"><img src="../部分图片/会员活动.png" alt="会员活动"></span>
          <span class="activity-body">
            <span class="activity-name">停云会员活动指南</span>
          </span>
        </button>
      </section>
    </section>

    <nav class="bottom-nav" aria-label="底部导航">
      <button class="nav-item active" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11.5 12 4l9 7.5"/><path d="M6 10.5V21h12V10.5"/><path d="M10 21v-6h4v6"/>
        </svg>
        <span>首页</span>
      </button>
      <button class="nav-item" type="button" onclick="goTo('menu')">
        <svg viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        <span>点餐</span>
      </button>
      <button class="nav-item" type="button" onclick="goToIntro()">
        <svg viewBox="0 0 24 24"><path d="M4 19l5-7 4 3 3-5 4 9"/><path d="M4 21h16"/><circle cx="16" cy="5" r="2"/></svg>
        <span>介绍</span>
      </button>
      <button class="nav-item" type="button" onclick="goTo('booking')">
        <svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M6 19v-8h12v8"/><path d="M8 11V7h8v4"/></svg>
        <span>预订</span>
      </button>
      <button class="nav-item" type="button" onclick="goTo('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 21c1.4-5 4.1-8 8-8s6.6 3 8 8"/>
        </svg>
        <span>我的</span>
      </button>
    </nav>
  </main>

  <script>
    const slides = Array.from(document.querySelectorAll(".hero-slide"));
    const dots = Array.from(document.querySelectorAll(".hero-dot"));
    const homeScroll = document.querySelector(".scroll");
    const homeTitlebar = document.getElementById("homeTitlebar");
    let currentSlide = 0;

    homeScroll.addEventListener("scroll", () => {
      homeTitlebar.classList.toggle("scrolled", homeScroll.scrollTop > 36);
    });

    setInterval(() => {
      slides[currentSlide].classList.remove("active");
      dots[currentSlide].classList.remove("active");
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add("active");
      dots[currentSlide].classList.add("active");
    }, 4200);

    function goTo(page) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: "navigate",
          target: page,
          page: page + ".html"
        }, "*");
      } else {
        window.location.href = page + ".html";
      }
    }

    function goToIntro() {
      goTo("intro");
    }

    function openActivity() {
      window.location.href = "activity.html";
    }
  </script>
</body>
</html>
