<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>停云山居 · 活动报名</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .form { display:grid; gap:12px; padding:14px; }
    label { display:grid; gap:7px; color:var(--ink-soft); font-size:13px; }
    .people { display:flex; align-items:center; justify-content:space-between; padding:11px 12px; border:1px solid rgba(26,26,26,.09); border-radius:10px; background:#fff; }
    .counter { display:flex; align-items:center; gap:13px; }
    .counter button { display:grid; width:28px; height:28px; place-items:center; border:1px solid rgba(79,111,82,.24); border-radius:50%; color:var(--green); }
  </style>
</head>
<body>
  <main class="app">
    <div class="scroll">
      <header class="topbar"><button class="back" onclick="goBack('activity-detail')" aria-label="返回"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 18l-6-6 6-6"/></svg></button><div><h1 class="title">活动报名</h1><p class="subtitle">山间茶艺品鉴会</p></div></header>
      <section class="content">
        <div class="status-banner bronze" style="margin:0"><h1>会员专属席位</h1><p>提交后状态为待确认，店员确认席位后会更新报名记录。</p></div>
        <section class="section"><div class="section-head"><h2 class="section-title">报名信息</h2></div><form class="card form" onsubmit="submitSignup(event)">
          <label>姓名<input class="field" value="山里人" required></label>
          <label>手机号<input class="field" value="13866886688" required></label>
          <label>参与人数<div class="people"><span>会员本人及同行者</span><span class="counter"><button type="button" onclick="changePeople(-1)">−</button><strong id="people">1</strong><button type="button" onclick="changePeople(1)">+</button></span></div></label>
          <label>备注<textarea class="field" placeholder="填写同行者或其他说明"></textarea></label>
          <button class="button" type="submit">提交报名</button>
        </form></section>
      </section>
    </div>
  </main>
  <div class="modal" id="success"><div class="sheet" style="text-align:center"><h2 class="sheet-title">报名已提交</h2><p class="sheet-copy">当前状态：待确认<br>店员确认后会更新活动记录。</p><button class="button" style="width:100%;margin-top:14px" onclick="navigateTo('member-center')">查看会员中心</button></div></div>
  <script src="common.js"></script>
  <script>
    let people=1;
    function changePeople(delta){ const next=people+delta; if(next<1)return; if(next>2){showToast("超过 2 人请联系客服沟通");return;} people=next;document.getElementById("people").textContent=people; }
    function submitSignup(e){e.preventDefault();document.getElementById("success").classList.add("open");}
  </script>
</body>
</html>
